<!DOCTYPE html>

    <title>Hamburgueria - Cardápio</title>

                </div>

            </div>

                </div>
            </div>



            
            <div class="card" onclick="window.location.href='hamburguer/hamburguer06.html'">
                <div class="card-img-container">
                    <img src="img/img06.png" alt="Tradicional Especial" class="card-img">
